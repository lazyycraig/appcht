<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Web Server</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-card {
            margin-top: 20px;
        }
        .auth-card h2 {
            margin-bottom: 25px;
            text-align: center;
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .auth-btn:hover {
            background-color: var(--primary-dark);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--danger-color);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .links span {
            color: var(--text-secondary);
            margin: 0 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card">
        <h2>WEB Server</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="type username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="type password" required>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button type="submit" class="auth-btn" id="submitBtn">Login</button>
        </form>
        <div class="links">
            <!-- <p>Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a></p> -->
            <!-- <p><a href="{{ url_for('index') }}">← Kembali ke beranda</a></p> -->
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
